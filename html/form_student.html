<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>New Student Registration</title>
    <link rel="stylesheet" href="../style/form_student.css">
</head>

<body>
    <!-- HEADER -->
    <header class="header">
        <div class="nav_bar">
            <h2>St. Robert's High School, Jakhalabandha</h2>
            <span class="pageTitle">Student Registration Form</span>
        </div>
    </header>

    <!-- FORM BODY -->
    <main class="form_body">
        <form action="../php/upload_student.php" method="post">
            <h3>Student Details</h3>
            <hr>

            <!-- Name Fields -->
            <div class="containerName">
                <label>First Name
                    <input type="text" name="Fname" placeholder="Enter First Name" required>
                </label>
                <label>Middle Name
                    <input type="text" name="Mname" placeholder="Enter Middle Name">
                </label>
                <label>Last Name
                    <input type="text" name="Lname" placeholder="Enter Last Name" required>
                </label>
            </div>

            <!-- Basic Info -->
            <div class="basicInfo">
                <label>Class
                    <input type="text" name="class" placeholder="e.g., 5th Grade" required>
                </label>
                <label>Roll No
                    <input type="number" name="rollno" placeholder="Enter Roll Number" required>
                </label>
                <label>Caste
                    <input type="text" name="caste" placeholder="Enter Caste">
                </label>
                <label>Date of Birth
                    <input type="date" name="DOB" required>
                </label>
                <label>Blood Group
                    <input type="text" name="blood" placeholder="e.g., A+" required>
                </label>
            </div>

            <!-- Parents Info -->
            <div class="containerParent">
                <h4>Parents/Guardian Details</h4>
                <div class="parent">
                    <label>Father's Name
                        <input type="text" name="Ftname" placeholder="Enter Father's Name">
                    </label>
                    <label>Contact Number
                        <input type="tel" name="Fcontact" placeholder="Enter Contact Number">
                    </label>
                    <label>Occupation
                        <input type="text" name="Foccupation" placeholder="Enter Occupation">
                    </label>
                </div>

                <div class="parent">
                    <label>Mother's Name
                        <input type="text" name="Mtname" placeholder="Enter Mother's Name">
                    </label>
                    <label>Contact Number
                        <input type="tel" name="Mcontact" placeholder="Enter Contact Number">
                    </label>
                    <label>Occupation
                        <input type="text" name="Moccupation" placeholder="Enter Occupation">
                    </label>
                </div>

                <div class="parent">
                    <label>Guardian's Name
                        <input type="text" name="Gurdian" placeholder="Enter Guardian Name">
                    </label>
                    <label>Contact Number
                        <input type="tel" name="Gcontact" placeholder="Enter Contact Number">
                    </label>
                </div>
            </div>

            <!-- Address -->
            <div class="address">
                <h4>Address Details</h4>
                <label>Village/Town
                    <input type="text" name="address" placeholder="Enter Village/Town" required>
                </label>
                <label>P.O
                    <input type="text" name="POaddress" placeholder="Post Office">
                </label>
                <label>Pin
                    <input type="number" name="pin" placeholder="Pin Code" required>
                </label>
                <label>District
                    <input type="text" name="Dist" placeholder="Enter District" required>
                </label>
                <label>State
                    <input type="text" name="State" placeholder="Enter State" required>
                </label>
            </div>

            <!-- Submit Button -->
            <div class="button">
                <input type="submit" name="submit" value="Submit Registration">
            </div>
        </form>
    </main>

    <!-- FOOTER -->
    <footer class="footer">
        <p>&copy; 2025 St. Robert's High School | All Rights Reserved</p>
        <p>Designed as Final Project</p>
    </footer>
</body>

</html>
