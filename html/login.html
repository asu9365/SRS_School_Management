    <h1>Login Form</h1>
    <form action="../php/connect.php" method="post">
        <div class="headingsContainer">
        </div>
        <div class="mainContainer">
            <label for="username">Your Username</label>
            <input type="text" placeholder="Enter Username" name="username" required>

            <label for="ID">Your Id Number</label>
            <input type="text" placeholder="Enter ID number" name="ID" required>

            <label for="myInput">Password</label>
            <input type="password" id="myInput" name="password" required>

            <label for="showPass" class="show-pass-label">
                <input type="checkbox" id="showPass" onclick="togglePassword()"> Show Password
            </label>

            <button type="submit">Login</button>
        </div>
    </form>
    <script>
        function togglePassword() {
            var x = document.getElementById("myInput");
            x.type = x.type === "password" ? "text" : "password";
        }
    </script>

</body>
